<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CICS Data Collection Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            /* Futuristic gradient background */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0c0f16 100%);
            color: #e2e8f0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* The main container with "Glassmorphism" effect */
        .portal-card {
            background: rgba(30, 41, 59, 0.5); /* Semi-transparent background */
            backdrop-filter: blur(10px); /* The blur effect */
            -webkit-backdrop-filter: blur(10px);
            max-width: 650px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* A visual accent light/glow */
        .portal-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: #22d3ee; /* Cyan accent color */
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.3;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 35px;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        label.field-label {
            display: block;
            font-weight: 500;
            font-size: 14px;
            color: #22d3ee;
            margin-bottom: 8px;
        }

        /* Stylized input fields */
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 15px;
            color: #f1f5f9;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Choice container (for radio and checkbox layouts) */
        .choice-section {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .choice-option {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .choice-option:last-child {
            margin-bottom: 0;
        }

        /* Stylized circular radio buttons */
        input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #334155;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: border-color 0.3s;
        }

        input[type="radio"]:checked {
            border-color: #22d3ee;
        }

        input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #22d3ee;
            border-radius: 50%;
        }

        /* Stylized checkboxes */
        input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #334155;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="checkbox"]:checked {
            border-color: #22d3ee;
            background-color: rgba(34, 211, 238, 0.2);
        }

        input[type="checkbox"]:checked::after {
            content: '✔';
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #22d3ee;
        }

        .choice-option label {
            font-weight: normal;
            font-size: 15px;
            color: #cbd5e1;
            cursor: pointer;
        }

        select {
            appearance: none; /* Required for custom styling */
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2322d3ee%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        textarea {
            resize: none;
            min-height: 120px;
        }

        /* Action Buttons */
        .action-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 211, 238, 0.5);
        }

        button[type="reset"] {
            background: transparent;
            border: 2px solid #334155;
            color: #94a3b8;
        }

        button[type="reset"]:hover {
            border-color: #f1f5f9;
            color: #f1f5f9;
            background: rgba(255, 255, 255, 0.05);
        }

    </style>
</head>
<body>

<div class="portal-card">
    <h2>Data Collection Portal</h2>
    <p class="subtitle">Information Technology Department | Lab 2</p>

    <form action="https://script.google.com/macros/s/AKfycby2bW2I4e6fsOJKqjvm9C4xTKJ0YoOJ3-Bdx-NeWxs2Q3ZHvloYly-xYdSGkU5wDHne/exec" method="POST">
        
        <div class="input-wrapper">
            <label for="name" class="field-label">Full Name / Student ID</label>
            <input type="text" id="name" name="name" placeholder="Juan de la Cruz" required>
        </div>

        <div class="input-wrapper">
            <label for="email" class="field-label">Institutional Email</label>
            <input type="email" id="email" name="email" placeholder="username@dlsud.edu.ph" required>
        </div>

        <div class="input-wrapper">
            <label class="field-label">Gender</label>
            <div class="choice-section">
                <div class="choice-option">
                    <input type="radio" id="male" name="gender" value="Male" required>
                    <label for="male">Male</label>
                </div>
                <div class="choice-option">
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>
                </div>
                <div class="choice-option">
                    <input type="radio" id="other" name="gender" value="Non-Binary/Other">
                    <label for="other">Non-Binary / Other</label>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <label for="ageGroup" class="field-label">Age Group Classification</label>
            <select id="ageGroup" name="ageGroup" required>
                <option value="" disabled selected>Select Classification</option>
                <option value="Under 18">Academic - Under 18</option>
                <option value="18-24">Academic - 18-24</option>
                <option value="25-34">Graduate - 25-34</option>
                <option value="35+">Staff/Other - 35+</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label class="field-label">Active Technology Interests (Select All That Apply)</label>
            <div class="choice-section">
                <div class="choice-option">
                    <input type="checkbox" id="frontend" name="interests" value="Front-end Dev">
                    <label for="frontend">Front-end Development (HTML/CSS/JS)</label>
                </div>
                <div class="choice-option">
                    <input type="checkbox" id="backend" name="interests" value="Back-end/Scripting">
                    <label for="backend">Back-end / Scripting (Apps Script/Node.js)</label>
                </div>
                <div class="choice-option">
                    <input type="checkbox" id="cloud" name="interests" value="Cloud Services">
                    <label for="cloud">Cloud Integration (Google Sheets/Firebase)</label>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <label for="comments" class="field-label">Lab Feedback & Additional Notes</label>
            <textarea id="comments" name="comments" placeholder="Include your findings or suggestions here..." required></textarea>
        </div>

        <div class="action-container">
            <button type="submit">Submit Data</button>
            <button type="reset">Clear Portal</button>
        </div>

    </form>
</div>

</body>
</html>
